name: Build & Push PHP

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Push PHP ${{ matrix.php_version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - php_version: 8.3.31
            tags: |
              8.3.31
              8.3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: |
          set -e

          TAG_ARGS=$(printf "%s\n" "${{ matrix.tags }}" \
            | sed "s|^|-t ghcr.io/sinaloense/pterodactyl-nginx-phpfpm:|")

          echo "Tags:"
          echo "$TAG_ARGS"

          docker build \
            --platform linux/amd64 \
            --build-arg PHP_VERSION="${{ matrix.php_version }}" \
            $TAG_ARGS \
            .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          while IFS= read -r tag; do
            docker push ghcr.io/sinaloense/pterodactyl-nginx-phpfpm:$tag
          done <<< "${{ matrix.tags }}"
